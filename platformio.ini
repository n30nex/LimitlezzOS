; LimitlezzOS — mesh-native handheld OS for LilyGO T-Deck
;
; Two environments:
;   tdeck  — ESP32-S3 firmware (Arduino core, TFT_eSPI, LVGL 8.3)
;   native — desktop simulator (SDL2) sharing the exact same UI code
;
; LVGL is pinned to 8.3.11 per the master spec ("Lock LVGL version immediately").

[platformio]
default_envs = native

[env]
lib_deps = lvgl/lvgl@8.3.11
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -I src

[env:tdeck]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
build_src_filter = +<*> -<../sim/>
lib_deps =
    ${env.lib_deps}
    lovyan03/LovyanGFX@^1.1.16
    jgromes/RadioLib@6.6.0
    rweather/Crypto@^0.4.0     ; Ed25519 for MeshCore advert signing (same lib MeshCore verifies with)
build_flags =
    ${env.build_flags}
    -D LZ_TARGET_TDECK
    -D BOARD_HAS_PSRAM
    ; ---- USB-C serial (native USB CDC) so the boot log is visible ----
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    ; Display: LovyanGFX (configured in code for the T-Deck ST7789V) — the
    ; known-good driver Meshtastic uses; manages the shared SPI bus correctly.

[env:native]
platform = native
build_src_filter = +<*> -<main_tdeck.cpp> +<../sim/>
build_flags =
    ${env.build_flags}
    -D LZ_TARGET_SIM
    !sdl2-config --cflags
    !sdl2-config --libs
    -O2
