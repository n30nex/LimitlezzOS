; LimitlezzOS — mesh-native handheld OS for LilyGO T-Deck
;
; Two environments:
;   tdeck  — ESP32-S3 firmware (Arduino core, TFT_eSPI, LVGL 8.3)
;   native — desktop simulator (SDL2) sharing the exact same UI code
;
; LVGL is pinned to 8.3.11 per the master spec ("Lock LVGL version immediately").

[platformio]
default_envs = native

[env]
lib_deps = lvgl/lvgl@8.3.11
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -I src

[env:tdeck]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
build_src_filter = +<*> -<../sim/>
lib_deps =
    ${env.lib_deps}
    bodmer/TFT_eSPI@2.5.43
build_flags =
    ${env.build_flags}
    -D LZ_TARGET_TDECK
    -D BOARD_HAS_PSRAM
    ; ---- TFT_eSPI: LilyGO T-Deck (ST7789, 320x240 landscape) ----
    -D USER_SETUP_LOADED
    -D ST7789_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=38
    -D TFT_MOSI=41
    -D TFT_SCLK=40
    -D TFT_CS=12
    -D TFT_DC=11
    -D TFT_RST=-1
    -D TFT_BL=42
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD -D LOAD_FONT2 -D LOAD_GFXFF -D SMOOTH_FONT

[env:native]
platform = native
build_src_filter = +<*> -<main_tdeck.cpp> +<../sim/>
build_flags =
    ${env.build_flags}
    -D LZ_TARGET_SIM
    !sdl2-config --cflags
    !sdl2-config --libs
    -O2
