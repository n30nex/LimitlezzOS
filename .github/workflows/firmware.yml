name: Firmware CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

jobs:
  build:
    name: Build firmware and simulator
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev pkg-config

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Build native simulator
        run: pio run -e native

      - name: Run native protocol selftest
        run: .pio/build/native/program --selftest

      - name: Build T-Deck firmware
        run: pio run -e tdeck

      - name: Capture T-Deck size report
        run: |
          pio run -e tdeck -t size | tee tdeck-size.txt
          {
            echo "## T-Deck firmware size"
            echo
            echo "\`\`\`"
            cat tdeck-size.txt
            echo "\`\`\`"
            echo
            echo "- firmware.bin: $(stat -c%s .pio/build/tdeck/firmware.bin) bytes"
            echo "- firmware.elf: $(stat -c%s .pio/build/tdeck/firmware.elf) bytes"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare T-Deck flash bundle
        env:
          ARTIFACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin .pio/build/tdeck/boot_app0.bin
          {
            echo "repo=${GITHUB_REPOSITORY}"
            echo "sha=${ARTIFACT_SHA}"
            echo "github_sha=${GITHUB_SHA}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "flash_offsets=0x0 bootloader.bin 0x8000 partitions.bin 0xe000 boot_app0.bin 0x10000 firmware.bin"
          } > .pio/build/tdeck/FLASH_MANIFEST.txt

      - name: Upload T-Deck artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tdeck-firmware-${{ github.event.pull_request.head.sha || github.sha }}
          if-no-files-found: error
          path: |
            .pio/build/tdeck/bootloader.bin
            .pio/build/tdeck/boot_app0.bin
            .pio/build/tdeck/firmware.bin
            .pio/build/tdeck/firmware.elf
            .pio/build/tdeck/firmware.map
            .pio/build/tdeck/partitions.bin
            .pio/build/tdeck/FLASH_MANIFEST.txt
